<!DOCTYPE html>
<html>
<head>
<title>SmartRep Biceps Coach 💪</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/pose-detection"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
body{margin:0;font-family:Poppins,Arial;background:#020617;color:white;text-align:center}
.header{display:flex;justify-content:space-between;align-items:center;padding:14px}
button{padding:11px 16px;margin:5px;border:none;border-radius:10px;background:#3b82f6;color:white;cursor:pointer;font-weight:600}
button:hover{background:#2563eb}
.camera-box{position:relative;width:640px;max-width:95%;margin:auto;border-radius:18px;overflow:hidden;box-shadow:0 0 30px rgba(59,130,246,.45)}
video{width:100%;transform:scaleX(-1)}
canvas{position:absolute;top:0;left:0;width:100%;height:100%;transform:scaleX(-1)}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:640px;margin:18px auto;padding:0 10px}
.card{background:#0f172a;border:1px solid #1e293b;border-radius:15px;padding:12px}
.card h3{margin:0;font-size:13px;color:#94a3b8}
.card p{margin:8px 0 0;font-size:22px;font-weight:700}
#feedback{font-size:22px;font-weight:700;padding:12px;color:#e0f2fe}
.hidden{display:none}
.status{color:#94a3b8}
</style>
</head>

<body>

<div class="header">
  <button onclick="goBack()">⬅ Back</button>
  <h2>Biceps Coach 💪</h2>
  <span></span>
</div>

<div class="camera-box">
  <video id="video" autoplay playsinline></video>
  <canvas id="canvas"></canvas>
</div>

<div class="stats">
  <div class="card"><h3>Total Reps</h3><p id="count">0</p></div>
  <div class="card"><h3>Left</h3><p id="leftCount">0</p></div>
  <div class="card"><h3>Right</h3><p id="rightCount">0</p></div>
  <div class="card"><h3>Calories</h3><p id="calories">0</p></div>
</div>

<p id="feedback">Loading AI...</p>

<div class="controls">
  <button id="startBtn" onclick="toggleStart()">Start</button>
  <button id="pauseBtn" class="hidden" onclick="togglePause()">Pause</button>
  <button onclick="saveWorkout()">Save</button>
  <button onclick="resetWorkout()">Reset</button>
</div>

<p class="status" id="status">Stopped</p>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBsL6ATzAach4mkO6-EIKsFdAWUJLHHkh4",
  authDomain: "smartrep-8ca34.firebaseapp.com",
  projectId: "smartrep-8ca34",
  storageBucket: "smartrep-8ca34.firebasestorage.app",
  messagingSenderId: "874359721336",
  appId: "1:874359721336:web:354997f4d68ab514dd8c8d",
  measurementId: "G-Q1H88BXYGW"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let detector = null;
let video, canvas, ctx;

let count = 0;
let leftCount = 0;
let rightCount = 0;
let calories = 0;

let leftStage = "down";
let rightStage = "down";
let leftValid = false;
let rightValid = false;

let leftSmooth = 0;
let rightSmooth = 0;

let isRunning = false;
let isPaused = false;
let animationId = null;
let cameraStarted = false;

let prevKeypoints = null;

let lastVoiceTime = 0;
let lastSpokenMsg = "";

async function checkAccess(){
  const user = auth.currentUser;

  if(!user){
    window.location.href = "index.html";
    return false;
  }

  const ref = db.collection("users").doc(user.uid);
  const doc = await ref.get();

  let data;

  if(!doc.exists){
    data = { freeUses: 5, isPremium: false };
    await ref.set(data);
  } else {
    data = doc.data();
  }

  if(data.isPremium === true || localStorage.getItem("premiumUser") === "true"){
    return true;
  }

  if(data.freeUses > 0){
    await ref.update({ freeUses: data.freeUses - 1 });
    alert(`Free uses left: ${data.freeUses - 1}`);
    return true;
  }

  const current = window.location.pathname.split("/").pop().replace(".html","");
window.location.href = "membership.html?from=" + current;
  return false;
}

function speak(msg){
  const now = Date.now();

  if(msg === lastSpokenMsg && now - lastVoiceTime < 5000) return;
  if(now - lastVoiceTime < 2500) return;

  speechSynthesis.cancel();

  const voice = new SpeechSynthesisUtterance(msg);
  voice.rate = 0.95;
  voice.pitch = 1;
  voice.volume = 1;

  speechSynthesis.speak(voice);

  lastVoiceTime = now;
  lastSpokenMsg = msg;
}

function goBack(){
  const params = new URLSearchParams(window.location.search);
  const from = params.get("from") || "dashboard";

  window.location.href = from + ".html";
}

async function loadDetector(){
  if(!detector){
    detector = await poseDetection.createDetector(
      poseDetection.SupportedModels.MoveNet,
      { modelType: poseDetection.movenet.modelType.SINGLEPOSE_THUNDER }
    );
  }
}

window.onload = async()=>{
  try{
    await loadDetector();
    document.getElementById("feedback").innerText = "AI Ready ✅";
  }catch(err){
    document.getElementById("feedback").innerText = "AI failed to load ❌";
    console.error(err);
  }
};

async function initCamera(){
  if(cameraStarted) return;

  video = document.getElementById("video");
  canvas = document.getElementById("canvas");
  ctx = canvas.getContext("2d");

  const stream = await navigator.mediaDevices.getUserMedia({
    video:{width:1280,height:720,frameRate:30}
  });

  video.srcObject = stream;

  await new Promise(resolve=>{
    video.onloadedmetadata = ()=>resolve();
  });

  await video.play();

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;

  cameraStarted = true;
}

function isVisible(...points){
  return points.every(p => p && p.score > 0.45);
}

function angle(A,B,C){
  const AB = Math.atan2(A.y-B.y,A.x-B.x);
  const CB = Math.atan2(C.y-B.y,C.x-B.x);
  let ang = Math.abs(AB-CB);
  if(ang > Math.PI) ang = 2*Math.PI-ang;
  return ang * 180 / Math.PI;
}

function drawSkeleton(keypoints){
  if(prevKeypoints){
    keypoints = keypoints.map((p,i)=>{
      const prev = prevKeypoints[i];
      return {
        ...p,
        x:0.75 * prev.x + 0.25 * p.x,
        y:0.75 * prev.y + 0.25 * p.y
      };
    });
  }

  prevKeypoints = keypoints;

  const pairs = [
    [5,7],[7,9],
    [6,8],[8,10],
    [5,6],
    [5,11],[6,12],
    [11,12]
  ];

  ctx.strokeStyle = "#00ffcc";
  ctx.lineWidth = 5;
  ctx.lineCap = "round";

  pairs.forEach(([i,j])=>{
    const p1 = keypoints[i];
    const p2 = keypoints[j];

    if(p1 && p2 && p1.score > 0.4 && p2.score > 0.4){
      ctx.beginPath();
      ctx.moveTo(p1.x,p1.y);
      ctx.lineTo(p2.x,p2.y);
      ctx.stroke();
    }
  });

  keypoints.forEach(p=>{
    if(p && p.score > 0.45){
      ctx.beginPath();
      ctx.arc(p.x,p.y,5,0,2*Math.PI);
      ctx.fillStyle = "#ff3b3b";
      ctx.fill();
    }
  });
}

function processArm(side, shoulder, elbow, wrist, currentSmooth){
  if(!isVisible(shoulder, elbow, wrist)){
    return {
      visible:false,
      counted:false,
      smooth:currentSmooth,
      feedback:`Show ${side} arm clearly`
    };
  }

  const rawAngle = angle(shoulder, elbow, wrist);
  const isActive = rawAngle < 150;
  const smooth = 0.72 * currentSmooth + 0.28 * rawAngle;

  let stage = side === "left" ? leftStage : rightStage;
  let valid = side === "left" ? leftValid : rightValid;

  let counted = false;
  let feedback = "";
  let bad = false;

  if(smooth > 160){
    stage = "down";
    valid = true;
    feedback = `${side} arm ready. Curl up slowly`;
  }

  if(smooth >= 70 && smooth <= 160){
    feedback = `Control your ${side} arm. Keep elbow steady`;
  }

  if(smooth < 45 && stage === "down"){
    if(valid){
      counted = true;
      feedback = `${side} arm good rep ✅`;
    }else{
      bad = true;
      feedback = `Bad ${side} rep. Lower fully before curling`;
    }

    stage = "up";
    valid = false;
  }

  if(side === "left"){
    leftStage = stage;
    leftValid = valid;
    leftSmooth = smooth;
  }else{
    rightStage = stage;
    rightValid = valid;
    rightSmooth = smooth;
  }

  return {visible:true,counted,bad,smooth,feedback,isActive};
}

async function toggleStart(){
  const startBtn = document.getElementById("startBtn");
  const pauseBtn = document.getElementById("pauseBtn");

  if(!isRunning){
    const allowed = await checkAccess();
    if(!allowed) return;

    isRunning = true;
    isPaused = false;

    startBtn.innerText = "Stop";
    pauseBtn.classList.remove("hidden");
    pauseBtn.innerText = "Pause";

    document.getElementById("status").innerText = "Live";
    document.getElementById("feedback").innerText = "Starting camera...";

    await initCamera();
    await loadDetector();

    detect();

  }else{
    isRunning = false;
    isPaused = false;

    startBtn.innerText = "Start";
    pauseBtn.classList.add("hidden");
    pauseBtn.innerText = "Pause";

    document.getElementById("status").innerText = "Stopped";

    cancelAnimationFrame(animationId);
  }
}

function togglePause(){
  const pauseBtn = document.getElementById("pauseBtn");

  if(!isPaused){
    isPaused = true;
    pauseBtn.innerText = "Resume";
    document.getElementById("status").innerText = "Paused";
  }else{
    isPaused = false;
    pauseBtn.innerText = "Pause";
    document.getElementById("status").innerText = "Live";
    detect();
  }
}

async function detect(){
  if(!isRunning || isPaused) return;

  if(!detector || video.readyState < 2){
    animationId = requestAnimationFrame(detect);
    return;
  }

  const poses = await detector.estimatePoses(video);

  ctx.clearRect(0,0,canvas.width,canvas.height);

  if(poses.length > 0){
    const k = poses[0].keypoints;

    drawSkeleton(k);

    const left = processArm("left", k[5], k[7], k[9], leftSmooth);
    const right = processArm("right", k[6], k[8], k[10], rightSmooth);

    if(!left.visible && !right.visible){
      document.getElementById("feedback").innerText = "Show one or both arms clearly";
      animationId = requestAnimationFrame(detect);
      return;
    }

    if(left.counted){
      leftCount++;
      count++;
      calories = Math.round(count * 0.15);
      document.getElementById("leftCount").innerText = leftCount;
      document.getElementById("count").innerText = count;
      document.getElementById("calories").innerText = calories;
    }

    if(right.counted){
      rightCount++;
      count++;
      calories = Math.round(count * 0.15);
      document.getElementById("rightCount").innerText = rightCount;
      document.getElementById("count").innerText = count;
      document.getElementById("calories").innerText = calories;
    }

    if(left.visible && right.visible){

  const leftActive = left.isActive || left.counted;
  const rightActive = right.isActive || right.counted;

  if(leftActive && rightActive){
    if(left.counted && right.counted){
      const msg = "Both arms good rep";
      document.getElementById("feedback").innerText = msg + " ✅";
      speak(msg);
    }else if(left.counted){
      const msg = "Left arm good. Control your right arm";
      document.getElementById("feedback").innerText = msg;
      speak(msg);
    }else if(right.counted){
      const msg = "Right arm good. Control your left arm";
      document.getElementById("feedback").innerText = msg;
      speak(msg);
    }else if(left.bad || right.bad){
      const msg = left.bad ? left.feedback : right.feedback;
      document.getElementById("feedback").innerText = msg;
      speak(msg);
    }else{
      document.getElementById("feedback").innerText =
        `${left.feedback}. ${right.feedback}`;
    }
  }

  else if(leftActive){
    if(left.counted){
      document.getElementById("feedback").innerText = "Left arm good rep ✅";
      speak("Left arm good rep");
    }else if(left.bad){
      document.getElementById("feedback").innerText = left.feedback;
      speak(left.feedback);
    }else{
      document.getElementById("feedback").innerText = left.feedback;
    }
  }

  else if(rightActive){
    if(right.counted){
      document.getElementById("feedback").innerText = "Right arm good rep ✅";
      speak("Right arm good rep");
    }else if(right.bad){
      document.getElementById("feedback").innerText = right.feedback;
      speak(right.feedback);
    }else{
      document.getElementById("feedback").innerText = right.feedback;
    }
  }

  else{
    document.getElementById("feedback").innerText =
      "Ready. Curl one arm or both arms";
  }
}

  }else{
    document.getElementById("feedback").innerText = "Stand clearly in camera";
  }

  animationId = requestAnimationFrame(detect);
}

function saveWorkout(){
  const user = auth.currentUser;

  if(!user){
    alert("Login first");
    return;
  }

  db.collection("workouts").add({
    userId:user.uid,
    exercise:"Biceps",
    reps:count,
    leftReps:leftCount,
    rightReps:rightCount,
    calories:calories,
    createdAt:new Date()
  })
  .then(()=>alert("Saved to dashboard ✅"))
  .catch(err=>alert(err.message));
}

function resetWorkout(){
  count = 0;
  leftCount = 0;
  rightCount = 0;
  calories = 0;

  leftStage = "down";
  rightStage = "down";
  leftValid = false;
  rightValid = false;
  leftSmooth = 0;
  rightSmooth = 0;
  prevKeypoints = null;

  document.getElementById("count").innerText = 0;
  document.getElementById("leftCount").innerText = 0;
  document.getElementById("rightCount").innerText = 0;
  document.getElementById("calories").innerText = 0;
  document.getElementById("feedback").innerText = "Ready...";

  speechSynthesis.cancel();
}
</script>

</body>
</html>
