<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SmartRep Auth</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
    }

    .container {
      width: 380px;
      background: #fff;
      border-radius: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      padding: 30px;
      text-align: center;
    }

    h2 { margin-bottom: 20px; }

    .input-box { margin: 15px 0; position: relative; }

    input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .eye {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      cursor: pointer;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #2a5298;
      color: white;
      cursor: pointer;
    }

    .btn.secondary { background: #555; }

    .toggle { margin-top: 15px; font-size: 14px; }
    .toggle span { color: #2a5298; cursor: pointer; font-weight: 600; }

    .hidden { display: none; }
    .error { color: red; font-size: 12px; text-align: left; }
    .success { color: green; font-size: 13px; margin-top: 10px; }
  </style>
</head>

<body>

<div class="container">

  <!-- Login -->
  <div id="loginForm">
    <h2>Login</h2>

    <div class="input-box">
      <input type="email" id="loginEmail" placeholder="Email">
      <div class="error" id="loginEmailError"></div>
    </div>

    <div class="input-box">
      <input type="password" id="loginPassword" placeholder="Password">
      <span class="eye" onclick="togglePassword('loginPassword')">👁️</span>
    </div>

    <button class="btn" id="loginBtn">Login</button>

    <div class="toggle" style="margin-top:10px;">
      <span onclick="forgotPassword()">Forgot Password?</span>
    </div>

    <div class="success" id="loginMsg"></div>

    <div class="toggle">
      Don't have an account? <span onclick="showSignup()">Sign Up</span>
    </div>
  </div>

  <!-- Signup -->
  <div id="signupForm" class="hidden">
    <h2>Sign Up</h2>

    <div class="input-box">
      <input type="text" id="name" placeholder="Full Name">
    </div>

    <div class="input-box">
      <input type="email" id="signupEmail" placeholder="Email">
      <div class="error" id="signupEmailError"></div>
    </div>

    <div class="input-box">
      <input type="password" id="signupPassword" placeholder="Password">
      <span class="eye" onclick="togglePassword('signupPassword')">👁️</span>
      <div class="error" id="passwordError"></div>
    </div>

    <button class="btn" id="signupBtn">Sign Up</button>

    <button class="btn secondary hidden" id="resendBtn">Resend Verification</button>

    <div class="success" id="verifyMsg"></div>

    <div class="toggle">
      Already have an account? <span onclick="showLogin()">Login</span>
    </div>
  </div>

</div>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBsL6ATzAach4mkO6-EIKsFdAWUJLHHkh4",
  authDomain: "smartrep-8ca34.firebaseapp.com",
  projectId: "smartrep-8ca34",
  storageBucket: "smartrep-8ca34.firebasestorage.app",
  messagingSenderId: "874359721336",
  appId: "1:874359721336:web:354997f4d68ab514dd8c8d",
  measurementId: "G-Q1H88BXYGW"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

function showSignup() {
  loginForm.classList.add('hidden');
  signupForm.classList.remove('hidden');
}

function showLogin() {
  signupForm.classList.add('hidden');
  loginForm.classList.remove('hidden');
}

function togglePassword(id) {
  const input = document.getElementById(id);
  input.type = input.type === 'password' ? 'text' : 'password';
}

function validateEmail(email) {
  return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
}

signupBtn.onclick = () => {
  const name = document.getElementById('name').value.trim();
  const email = signupEmail.value.trim();
  const password = signupPassword.value;

  signupEmailError.innerText = '';
  passwordError.innerText = '';
  verifyMsg.innerText = '';

  if (name.length < 2) {
    verifyMsg.innerText = "Enter your full name";
    return;
  }

  if (!validateEmail(email)) {
    signupEmailError.innerText = "Invalid email";
    return;
  }

  if (password.length < 6) {
    passwordError.innerText = "Password must be 6+ characters";
    return;
  }

  auth.createUserWithEmailAndPassword(email, password)
    .then(userCred => {
      return userCred.user.updateProfile({
        displayName: name
      }).then(() => {
        userCred.user.sendEmailVerification();
        verifyMsg.innerText = "Verification email sent 📩";
        resendBtn.classList.remove('hidden');

        setTimeout(() => {
          showLogin();
        }, 2000);
      });
    })
    .catch(err => {
      if (err.code === 'auth/email-already-in-use') {
        signupEmailError.innerText = "Account exists → Try login";
        resendBtn.classList.remove('hidden');
      } else {
        alert(err.message);
      }
    });
};

resendBtn.onclick = () => {
  const email = signupEmail.value.trim();
  const password = signupPassword.value;

  auth.signInWithEmailAndPassword(email, password)
    .then(userCred => {
      if (!userCred.user.emailVerified) {
        userCred.user.sendEmailVerification();
        verifyMsg.innerText = "Verification resent 📩";
      }
    })
    .catch(() => {
      verifyMsg.innerText = "Login first to resend";
    });
};

loginBtn.onclick = () => {
  const email = loginEmail.value.trim();
  const password = loginPassword.value;

  loginEmailError.innerText = '';
  loginMsg.innerText = '';

  if (!validateEmail(email)) {
    loginEmailError.innerText = "Invalid email";
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .then(async userCred => {

      if (!userCred.user.emailVerified) {
        loginMsg.innerText = "Verify your email first";
        return;
      }

      if (!userCred.user.displayName) {
        await userCred.user.updateProfile({
          displayName: "Subhrajit"
        });
      }

      loginMsg.innerText = "Login Successful ✅";

      setTimeout(() => {
        window.location.href = "dashboard.html";
      }, 1000);

    })
    .catch(err => alert(err.message));
};

function forgotPassword() {
  const email = loginEmail.value.trim();

  if (!validateEmail(email)) {
    alert("Enter your email first");
    return;
  }

  auth.sendPasswordResetEmail(email)
    .then(() => {
      alert("Password reset email sent 📩");
    })
    .catch(err => alert(err.message));
}
</script>

</body>
</html>
